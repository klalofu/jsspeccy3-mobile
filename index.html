<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#0000aa" />
    <title>ZX Spectrum</title>
    
    <!-- Стили меню и эмулятора -->
    <style>
        html, body { width: 100%; height: 100%; margin: 0; padding: 0; overflow: hidden; background-color: #000; font-family: 'Courier New', Courier, monospace; }
        
        /* Контейнер эмулятора */
        #jsspeccy { width: 100%; height: 100%; }

        /* Экран меню (скрыт по умолчанию) */
        #menu-screen { 
            width: 100%; height: 100%; 
            display: none; /* Скрыт по умолчанию */
            flex-direction: column; justify-content: center; align-items: center; 
            background-color: #0000aa; color: #ffff00; 
            position: absolute; top: 0; left: 0; z-index: 10;
        }
        #menu-screen h1 { font-size: 24px; margin-bottom: 30px; text-shadow: 2px 2px #000; text-align: center; }
        .game-list { display: flex; flex-direction: column; gap: 15px; width: 80%; max-width: 400px; }
        .game-btn {
            background-color: #000; color: #0ff; border: 2px solid #0ff;
            padding: 15px; font-size: 16px; font-family: inherit; cursor: pointer;
            text-decoration: none; text-align: center; display: block;
        }
        .game-btn:hover, .game-btn:active { background-color: #0ff; color: #000; }
    </style>

    <!-- Telegram API -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>

    <!-- 1. Контейнер эмулятора (он нужен всегда) -->
    <div id="jsspeccy"></div>

    <!-- 2. Экран меню (накладывается сверху, показываем если нет игры) -->
    <div id="menu-screen">
        <h1>ZX SPECTRUM</h1>
        <div class="game-list" id="game-list-container"></div>
    </div>

    <script>
        // === ОТЛАДКА ===
        alert("Страница загружена, скрипт работает!"); // Должно выпрыгнуть окно при загрузке
        console.log("Script started");

        // === КОНФИГ ИГР ===
        const GAMES = [
            { file: 'rex1.tzx', name: 'R.E.X.' },
            { file: 'RiverRaid.tap', name: 'River Raid' },
            { file: 'PanamaJoe.tap', name: 'Panama Joe' },
            { file: 'NetherEarth.tap', name: 'Nether Earth' },
            { file: 'LodeRunner.z80', name: 'Lode Runner' }
        ];
        const BASE_URL = 'https://klalofu.github.io/jsspeccy3-mobile/games/';

        const initApp = function() {
            console.log("initApp function called");
            
            // 1. Telegram Init
            if (window.Telegram && window.Telegram.WebApp) {
                window.Telegram.WebApp.expand();
                console.log("Telegram WebApp initialized");
            }

            const url = new URL(window.location.href);
            const gameUrl = url.searchParams.get('u'); 
            console.log("Detected URL param 'u':", gameUrl);

            if (gameUrl) {
                // --- РЕЖИМ ИГРЫ ---
                console.log("Mode: GAME");
                document.getElementById('menu-screen').style.display = 'none';
                
                // ПРОВЕРКА: Существует ли JSSpeccy?
                if (typeof JSSpeccy === 'undefined') {
                    alert("Ошибка: Библиотека JSSpeccy не загружена! Проверьте подключение скрипта.");
                    console.error("JSSpeccy is undefined!");
                    return;
                }

                const emuParams = {
                    zoom: 3,
                    sandbox: false,
                    autoLoadTapes: true,
                    openUrl: gameUrl
                };

                console.log("Starting emulator with params:", emuParams);
                
                try {
                    const emu = JSSpeccy(document.getElementById('jsspeccy'), emuParams);
                    window.emu = emu;
                    console.log("Emulator started successfully");
                } catch (e) {
                    alert("Ошибка запуска эмулятора: " + e.message);
                    console.error(e);
                }

                // ... СЮДА НУЖНО ВСТАВИТЬ КОД ВИРТУАЛЬНОЙ КЛАВИАТУРЫ ИЗ ОРИГИНАЛА ...
                // Если его нет, кнопок не будет, но игра должна пойти.

            } else {
                // --- РЕЖИМ МЕНЮ ---
                console.log("Mode: MENU");
                document.getElementById('menu-screen').style.display = 'flex';
                
                const listContainer = document.getElementById('game-list-container');
                if (!listContainer) {
                    alert("Ошибка: Не найден контейнер game-list-container!");
                    return;
                }
                listContainer.innerHTML = '';

                GAMES.forEach(game => {
                    const btn = document.createElement('a');
                    btn.className = 'game-btn';
                    btn.innerText = game.name;
                    btn.href = window.location.origin + window.location.pathname + '?u=' + encodeURIComponent(BASE_URL + game.file);
                    listContainer.appendChild(btn);
                });
                console.log("Menu generated");
            }
        }

        window.addEventListener('load', initApp);
    </script>
    <script src="runtime/jsspeccy.js"></script>
</body>
</html>
