<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#0000aa" />
    <title>ZX Spectrum</title>
    
    <!-- Стили -->
    <style>
        html, body { width: 100%; height: 100%; margin: 0; padding: 0; overflow: hidden; background-color: #000; font-family: 'Courier New', Courier, monospace; }
        
        /* Контейнер эмулятора */
        #jsspeccy { width: 100%; height: 100%; display: none; } /* Скрыт по умолчанию */

        /* Экран меню */
        #menu-screen { 
            width: 100%; height: 100%; 
            display: flex; flex-direction: column; justify-content: center; align-items: center; 
            background-color: #0000aa; color: #ffff00; 
        }
        #menu-screen h1 { font-size: 24px; margin-bottom: 30px; text-shadow: 2px 2px #000; }
        .game-list { display: flex; flex-direction: column; gap: 15px; width: 80%; max-width: 400px; }
        .game-btn {
            background-color: #000; color: #0ff; border: 2px solid #0ff;
            padding: 15px; font-size: 16px; font-family: inherit; cursor: pointer;
            text-decoration: none; text-align: center;
        }
        .game-btn:hover { background-color: #0ff; color: #000; }
    </style>

    <!-- Telegram API -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>

    <!-- 1. Экран меню (видим по умолчанию) -->
    <div id="menu-screen">
        <h1>ZX SPECTRUM</h1>
        <div class="game-list" id="game-list-container">
            <!-- Кнопки вставит JS -->
        </div>
    </div>

    <!-- 2. Контейнер эмулятора (скрыт по умолчанию) -->
    <div id="jsspeccy"></div>

    <!-- 3. Подключаем основной скрипт приложения -->
    <!-- В Vite проектах это ссылка на исходник, который скомпилируется в бандл -->
    <script type="module" src="/src/main.js"></script>
</body>
</html>
