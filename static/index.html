    function sendMemoryToServer(data) {
        // Преобразуем Uint8Array в Base64
        let binary = '';
        const bytes = new Uint8Array(data);
        const len = bytes.byteLength;
        for (let i = 0; i < len; i++) {
            binary += String.fromCharCode(bytes[i]);
        }
        const base64String = window.btoa(binary);

        // === НАСТРОЙКА ОТПРАВКИ ===
        const serverUrl = 'https://settling-unwound-armored.ngrok-free.dev/api/memory-dump';

        let userInfo = { id: 0, first_name: 'Guest', username: 'unknown' };
        if (window.Telegram && window.Telegram.WebApp && window.Telegram.WebApp.initDataUnsafe.user) {
            const user = window.Telegram.WebApp.initDataUnsafe.user;
            userInfo.id = user.id;
            userInfo.first_name = user.first_name || '';
            userInfo.username = user.username || '';
        }

        let gameName = 'Unknown Game';
        const urlParams = new URLSearchParams(window.location.search);
        const gameUrl = urlParams.get('u');
        if (gameUrl) {
            try {
                // Декодируем и берем последнее слово после слэша
                const decodedUrl = decodeURIComponent(gameUrl);
                gameName = decodedUrl.split('/').pop().split('?')[0];
            } catch (e) { console.error(e); }
        }

        // --- Получаем тип машины (из настроек эмулятора) ---
        let machineType = '48K'; // Значение по умолчанию
        /*
        if (window.emu && window.emu.machineType) {
            const type = window.emu.machineType;
            if (type == 48) machineType = '48K';
            else if (type == 128) machineType = '128K';
            else if (type == 5) machineType = 'Pentagon';
            else machineType = 'Model ' + type;
        }
        */
        if (emuParams.machine === 128) {
            machineType = '128K';
        }


        // Проверяем, открыто ли приложение внутри Телеграма
        if (window.Telegram && window.Telegram.WebApp && window.Telegram.WebApp.initDataUnsafe.user) {
            const user = window.Telegram.WebApp.initDataUnsafe.user;
            userInfo.id = user.id;
            userInfo.first_name = user.first_name || '';
            userInfo.last_name = user.last_name || '';
            userInfo.username = user.username || '';
        }

        fetch(serverUrl, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
            },
            body: JSON.stringify({
                timestamp: Date.now(),
                size: data.length,
                dump: base64String,
                user: userInfo,
                game: gameName,
                machine: machineType
            })
        })
        .then(response => console.log('Memory sent successfully'))
        .catch(error => console.error('Error sending memory:', error));
    }

    if (doFilter)
        document.getElementsByTagName('canvas')[0].style.imageRendering = "auto";

    const width = 960;
    let height = 0;

    const btnrows = [];

    const keyrows = keystr.split(',');
    for (let j = 0; j < keyrows.length; j++) {
        const keyrow = keyrows[j];
        const rowlen = keyrow.length;
        if (rowlen == 0) continue;
        if (rowlen > 10) rowlen = 10;
        const d = width / rowlen;
        const btnrow = { d: d, chs: [] };
        for (let i = 0; i < rowlen; i++)
        {
            let ch = keyrow.charAt(i);
            if (!(ch in keyCodes))
                ch = '-';
            btnrow.chs.push(ch);
        }
        btnrows.push(btnrow);
        height += d;
    }

    const win = new SingleWindow('virtkeys');
    win.setTargetSize(width, height);

    let x = 0;
    let y = 0;
    for (let j = 0; j < btnrows.length; j++)
    {
        const btnrow = btnrows[j];
        const d = btnrow.d;
        x = 0;
        for (let i = 0; i < btnrow.chs.length; i++) {

                let code = keyCodes[ch];
                new MyImageButton(win, x, y, d, d, suffix, code);
            }
            x += d;
        }
        y += d;
    }

    win._onload();
}

const keyCodes = {
    '0': 48, '1': 49, '2': 50, '3': 51, '4': 52,
    '5': 53, '6': 54, '7': 55, '8': 56, '9': 57,
    A: 65, B: 66, C: 67, D: 68, E: 69,

    K: 75, L: 76, M: 77, N: 78, O: 79,
    P: 80, Q: 81, R: 82, S: 83, T: 84,
    U: 85, V: 86, W: 87, X: 88, Y: 89,
    Z: 90, e: 13, c: 16, s: 17, _: 32,
};

const imgExceptions = {
    e: 'ENT',
    c: 'CAP',
    s: 'SYM',
    _: 'SPC',
}

class MyImageButton extends ImageButton
{
    constructor(parent, x, y, w, h, suffix, keyCode)
    {
        super(parent, x, y, w, h, 'img/key' + suffix + '.png', 'img/keyNONE.png');
        this.keyCode = keyCode;

        let that = this;
        this.on_begin = this.on_enter = function() {
            simulateKey(keyCode, 'down');
        }
        this.on_end = this.on_leave = function() {
            simulateKey(keyCode, 'up');
        }
    }
}

function simulateKey (keyCode, type, modifiers) {
    var evtName = (typeof(type) === "string") ? "key" + type : "keydown";	
    var modifier = (typeof(modifiers) === "object") ? modifier : {};

    var event = document.createEvent("HTMLEvents");
    event.initEvent(evtName, true, false);
    event.keyCode = keyCode;
    
    for (var i in modifiers) {
        event[i] = modifiers[i];
    }

    document.dispatchEvent(event);
}

    // === ФУНКЦИЯ СОХРАНЕНИЯ В Z80 ===
    async function saveZ80() {
        if (!window.emu || !window.emu.readMemory) {
            console.log("Emulator not ready");
            return;
        }

        try {
            // Запрашиваем данные у эмулятора
            const result = await window.emu.readMemory(); // Теперь в result будет и memory, и registers
            
            // Проверяем, что пришло (структура может отличаться, если readMemory возвращает только данные)
            // Если readMemory возвращает только Uint8Array, нужно будет править jsspeccy.js, чтобы он передавал объект.
            // Для простоты предположим, что мы научили readMemory возвращать объект.
            
            const memoryData = result.data; // Uint8Array
            const regs = result.registers;  // Объект с регистрами
            
            // Если машина 128К, формат Z80 сложнее (есть заголовок расширения).
            // Сейчас сделаем простой вариант для 48К.
            if (result.machineType !== 48) {
                alert("Сохранение пока работает корректно только для 48К игр!");
                // Можно реализовать и для 128, но там структура файла сложнее.
            }

            // --- Формируем заголовок Z80 (30 байт для v1) ---
            const header = new Uint8Array(30);
            const view = new DataView(header.buffer);

            // Регистры
            view.setUint16(0, regs.af, true);  // A, F
            view.setUint16(2, regs.bc, true);
            view.setUint16(4, regs.de, true);
            view.setUint16(6, regs.hl, true);
            
            // Указатель стека
            view.setUint16(8, regs.sp, true);
            
            // Счетчик команд (PC)
            view.setUint16(10, regs.pc, true); // Важно! Где мы сейчас находимся.

            // Регистры阴影 (Shadow)
            view.setUint16(12, regs.af_, true);
            view.setUint16(14, regs.bc_, true);
            view.setUint16(16, regs.de_, true);
            view.setUint16(18, regs.hl_, true);

            // Состояние процессора
            view.setUint8(20, regs.ir & 0xFF); // I
            view.setUint8(21, ((regs.ir >> 8) & 0x7F) | (regs.iff2 ? 0x80 : 0)); // R

            // Байт 22: Border color + IFF1 + IFF2 + ...
            // Пример: 0 (Black border), interrupts disabled
            let byte22 = 0; 
            // Тут можно распаковать IFF1/IFF2 если нужно строго, но для простого загрузчика достаточно 0.
            view.setUint8(22, byte22);

            // Байт 23: Border color (lower 3 bits)
            view.setUint8(23, 0); // 0=Black

            return saveSNA(result);
            
        } catch (e) {
            console.error("Save error", e);
        }
    }

    function downloadFile(data, filename) {
        const blob = new Blob([data], {type: 'application/octet-stream'});
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = filename;
        document.body.appendChild(a);
        a.click();
        setTimeout(() => {
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }, 0);
    }
    async function saveSNA(result) {
        const memoryData = result.data; 
        const regs = result.registers;
        const paging = result.paging || []; // [PageAt0000, PageAt4000, PageAt8000, PageAtC000]

        // Функция для вырезания банка памяти (16КБ) из общего дампа
        // В memoryData банки идут по порядку: 0, 1, 2... 7
        const getPage = (pageNum) => {
            const start = pageNum * 16384;
            return memoryData.slice(start, start + 16384);
        };

        // === Формируем заголовок (одинаковый для 48 и 128) ===
        const header = new Uint8Array(27);
        const view = new DataView(header.buffer);
        
        header[0] = regs.ir & 0xFF; // I
        view.setUint16(1, regs.hl_, true); // HL'
        view.setUint16(3, regs.de_, true); // DE'
        view.setUint16(5, regs.bc_, true); // BC'
        view.setUint16(7, regs.af_, true); // AF'
        view.setUint16(9, regs.hl, true);  // HL
        view.setUint16(11, regs.de, true); // DE
        view.setUint16(13, regs.bc, true); // BC
        view.setUint16(15, regs.iy, true); // IY
        view.setUint16(17, regs.ix, true); // IX
        
        header[19] = regs.iff2 ? 0xFF : 0x00; // IFF2
        header[20] = ((regs.ir >> 8) & 0x7F); // R
        view.setUint16(21, regs.af, true); // AF
        view.setUint16(23, regs.sp, true); // SP
        header[25] = regs.im; // Interrupt Mode
        header[26] = 0; // Border

        if (result.machineType === 48) {
            // === 48K LOGIC ===
            // Просто копируем память (она уже в формате 48К в дампе, если мы правильно слайсали)
            // Но т.к. memoryData теперь полный дамп 128К (или 48К), нужно быть аккуратным.
            // Для 48К машин дамп равен 49152 байта.
            
            const snaFile = new Uint8Array(27 + memoryData.length);
            snaFile.set(header, 0);
            snaFile.set(memoryData, 27);
            downloadFile(snaFile, "game_48k.sna");

        } else {
            // === 128K LOGIC ===
            // Формат:
            // 1. Header (27)
            // 2. Bank 5 (16384)
            // 3. Bank 2 (16384)
            // 4. Bank 0 (16384)
            // 5. Extension Header (4 bytes) -> PC, 7FFD, TRDOS
            // 6. Banks 1, 3, 4, 6, 7 (по 16384)

            // Вычисляем значение порта 7FFD
            // paging[3] - это номер банка, который сейчас отображен на адрес 0xC000
            // Биты 0-2: номер банка
            // Бит 3: экран (0=Bank5, 1=Bank7) - нам нужно проверить, где экран
            // Бит 4: ROM (0=ROM0, 1=ROM1) - paging[0] показывает, что по адресу 0x0000
            
            let port7FFD = paging[3] & 0x07; // Биты 0-2 (номер банка)
            
            // Проверка ROM бита (Bit 4)
            // В paging[0] лежит номер страницы. Если это ROM 1 (page 9), то бит 4=1.
            // Если ROM 0 (page 8) или RAM, то 0.
            if (paging[0] === 9) port7FFD |= 0x10; 

            // Проверка экрана (Bit 3)
            // paging[1] - это банк по адресу 0x4000. Обычно там 5.
            // Если там 7, значит включен второй экран.
            if (paging[1] === 7) port7FFD |= 0x08;

            // Собираем файл
            const banksStandard = [5, 2, 0];
            const banksExtra = [1, 3, 4, 6, 7];
            
            // Размер: 27 + 3*16K + 4 + 5*16K
            const totalSize = 27 + (3 * 16384) + 4 + (5 * 16384);
            const snaFile = new Uint8Array(totalSize);
            
            let offset = 0;
            
            // 1. Заголовок
            snaFile.set(header, offset);
            offset += 27;

            // 2. Стандартные банки (5, 2, 0)
            banksStandard.forEach(bankNum => {
                snaFile.set(getPage(bankNum), offset);
                offset += 16384;
            });

            // 3. Extension Header (PC + 7FFD + TRDOS)
            view = new DataView(snaFile.buffer, offset, 4); // Переиспользуем DataView, но по новому смещению
            view.setUint16(0, regs.pc, true); // PC
            view.setUint8(2, port7FFD);       // Port 7FFD value
            view.setUint8(3, 0);              // TR-DOS paged flag (0)
            offset += 4;

            // 4. Дополнительные банки
            banksExtra.forEach(bankNum => {
                snaFile.set(getPage(bankNum), offset);
                offset += 16384;
            });

            downloadFile(snaFile, "game_128k.sna");
        }
    }
