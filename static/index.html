<!doctype html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <!-- Обновленный viewport для мобильных и Telegram -->
        <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
        <title>ZX Spectrum</title>
        
        <!-- Подключаем API Telegram -->
        <script src="https://telegram.org/js/telegram-web-app.js"></script>
        
        <script src="jsspeccy/jsspeccy.js"></script>
        <style>
            * {
                margin: 0;
                padding: 0;
            }
            body {
                background-color: #000; /* Черный фон по умолчанию */
                font-family: 'Courier New', Courier, monospace; /* Для меню */
            }
            
            /* Контейнеры эмулятора */
            #jsspeccy, #guiparent {
                /* Оставляем 100% ширину для адаптивности, но ограничиваем макс. ширину */
                width: 100%;
                max-width: 960px;
                margin: auto;
            }
            #jsspeccy {
                background-color: #FFF;
            }
            canvas {
                image-rendering: -moz-crisp-edges;
                image-rendering: -webkit-crisp-edges;
                image-rendering: pixelated;
                image-rendering: crisp-edges;
            }
            canvas#virtkeys {
                image-rendering: auto;
            }

            /* === СТИЛИ ДЛЯ МЕНЮ === */
            #menu-screen {
                position: fixed; top: 0; left: 0; width: 100%; height: 100%;
                background-color: #0000aa; /* Синий фон Спектрума */
                color: #ffff00; /* Желтый текст */
                z-index: 9999; /* Поверх всего */
                display: none; /* Скрыт по умолчанию */
                flex-direction: column;
                justify-content: center;
                align-items: center;
                overflow: auto;
            }
            #menu-screen h1 {
                font-size: 24px;
                margin-bottom: 30px;
                text-shadow: 2px 2px #000;
                text-align: center;
            }
            .game-list {
                display: flex;
                flex-direction: column;
                gap: 15px;
                width: 85%;
                max-width: 400px;
            }
            .game-btn {
                background-color: #000;
                color: #0ff; /* Бирюзовые кнопки */
                border: 2px solid #0ff;
                padding: 15px;
                font-size: 16px;
                font-family: inherit;
                cursor: pointer;
                text-decoration: none;
                text-align: center;
                display: block;
                transition: 0.2s;
            }
            .game-btn:hover, .game-btn:active {
                background-color: #0ff;
                color: #000;
            }
        </style>
    </head>
    <body onload="onBodyLoad()">
        
        <!-- ЭКРАН МЕНЮ (добавлен сюда) -->
        <div id="menu-screen">
            <h1>ZX SPECTRUM</h1>
            <div class="game-list" id="game-list-container"></div>
        </div>

        <!-- Оригинальные контейнеры эмулятора -->
        <div id="jsspeccy"></div>
        <div id="guiparent"><canvas id=virtkeys width=960></canvas></div>
    </body>

    <script src="canvasgui/PointerEventHandler.js"></script>
    <script src="canvasgui/canvasgui.js"></script>
    
    <script>
"use strict";
/*****************************************************************************/        
const onBodyLoad = function()
{
    // === ИНИЦИАЛИЗАЦИЯ TELEGRAM ===
    if (window.Telegram && window.Telegram.WebApp) {
        window.Telegram.WebApp.expand();
        window.Telegram.WebApp.setHeaderColor('#0000aa');
    }

    // === ПРОВЕРКА РЕЖИМА (МЕНЮ ИЛИ ИГРА) ===
    const url = new URL(window.location.href);
    const gameUrlParam = url.searchParams.get('u');

    if (!gameUrlParam) {
        // --- РЕЖИМ МЕНЮ ---
        document.getElementById('menu-screen').style.display = 'flex';
        document.getElementById('jsspeccy').style.display = 'none';
        document.getElementById('guiparent').style.display = 'none';
        
        const listContainer = document.getElementById('game-list-container');
        listContainer.innerHTML = 'Loading game list...'; // Сообщение о загрузке

        const baseUrl = 'https://klalofu.github.io/jsspeccy3-mobile/games/';

        // Загружаем автоматически сгенерированный список
        fetch('games.json')
            .then(response => response.json())
            .then(games => {
                listContainer.innerHTML = ''; // Очищаем "Loading..."
                
                if (games.length === 0) {
                    listContainer.innerHTML = '<div style="color:white">No games found</div>';
                    return;
                }

                games.forEach(game => {
                    const btn = document.createElement('a');
                    btn.className = 'game-btn';
                    // Если в JSON есть имя, берем его, иначе имя файла
                    btn.innerText = game.name; 
                    btn.href = window.location.origin + window.location.pathname + '?u=' + encodeURIComponent(baseUrl + game.file);
                    listContainer.appendChild(btn);
                });
            })
            .catch(err => {
                console.error(err);
                listContainer.innerHTML = 'Error loading list';
            });

        return;
    }
    // --- РЕЖИМ ИГРЫ (Оригинальный код) ---
    // Скрываем меню на всякий случай
    document.getElementById('menu-screen').style.display = 'none';
    document.getElementById('jsspeccy').style.display = 'block'; // Восстанавливаем видимость
    document.getElementById('guiparent').style.display = 'block';

    const emuParams = {
        zoom: 3,
        sandbox: false,
        autoLoadTapes: true,
        autoStart: true,
    };

    const defkeystr = '1234567890,QWERTYUIOP,ASDFGHJKLe,cZXCVBNMs_';
    let keystr = defkeystr;

    let doFilter = false;

    // Проходимся по параметрам URL (оригинальная логика)
    for (const [key, value] of url.searchParams)
    {
        if (key == 'm') {
            if (value == '48' || value == '128' || value == '5')
                emuParams.machine = value;
        }
        else if (key == 'k') {
            keystr = value;
        }
        else if (key == 'u') {
            emuParams.openUrl = value;
        }
        else if (key == 'f') {
            if (value && value != 0)
                doFilter = true;
        }
    }

    const emu = JSSpeccy(document.getElementById('jsspeccy'), emuParams);
    window.emu = emu;
    if (doFilter)
        document.getElementsByTagName('canvas')[0].style.imageRendering = "auto";

    // === ОСТАЛЬНОЙ КОД ВИРТУАЛЬНОЙ КЛАВИАТУРЫ (БЕЗ ИЗМЕНЕНИЙ) ===
    const width = 960;
    let height = 0;

    const btnrows = [];

    const keyrows = keystr.split(',');
    for (let j = 0; j < keyrows.length; j++) {
        const keyrow = keyrows[j];
        const rowlen = keyrow.length;
        if (rowlen == 0) continue;
        if (rowlen > 10) rowlen = 10;
        const d = width / rowlen;
        const btnrow = { d: d, chs: [] };
        for (let i = 0; i < rowlen; i++)
        {
            let ch = keyrow.charAt(i);
            if (!(ch in keyCodes))
                ch = '-';
            btnrow.chs.push(ch);
        }
        btnrows.push(btnrow);
        height += d;
    }

    const win = new SingleWindow('virtkeys');
    win.setTargetSize(width, height);

    let x = 0;
    let y = 0;
    for (let j = 0; j < btnrows.length; j++)
    {
        const btnrow = btnrows[j];
        const d = btnrow.d;
        x = 0;
        for (let i = 0; i < btnrow.chs.length; i++) {
            const ch = btnrow.chs[i];
            if (ch == '-')
                new ImageButton(win, x, y, d, d, 'img/keyNONE.png', 'img/keyNONE.png');
            else {
                let suffix = ch;
                if (suffix in imgExceptions)
                    suffix = imgExceptions[ch];
                let code = keyCodes[ch];
                new MyImageButton(win, x, y, d, d, suffix, code);
            }
            x += d;
        }
        y += d;
    }

    win._onload();
}

// _: [space]        space
// e: [enter]        enter
// c: [caps   shift] shift
// s: [symbol shift] ctrl
// 
const keyCodes = {
    '0': 48, '1': 49, '2': 50, '3': 51, '4': 52,
    '5': 53, '6': 54, '7': 55, '8': 56, '9': 57,
    A: 65, B: 66, C: 67, D: 68, E: 69,
    F: 70, G: 71, H: 72, I: 73, J: 74,
    K: 75, L: 76, M: 77, N: 78, O: 79,
    P: 80, Q: 81, R: 82, S: 83, T: 84,
    U: 85, V: 86, W: 87, X: 88, Y: 89,
    Z: 90, e: 13, c: 16, s: 17, _: 32,
};

const imgExceptions = {
    e: 'ENT',
    c: 'CAP',
    s: 'SYM',
    _: 'SPC',
}

class MyImageButton extends ImageButton
{
    constructor(parent, x, y, w, h, suffix, keyCode)
    {
        super(parent, x, y, w, h, 'img/key' + suffix + '.png', 'img/keyNONE.png');
        this.keyCode = keyCode;

        let that = this;
        this.on_begin = this.on_enter = function() {
            simulateKey(keyCode, 'down');
        }
        this.on_end = this.on_leave = function() {
            simulateKey(keyCode, 'up');
        }
    }
}

function simulateKey (keyCode, type, modifiers) {
    var evtName = (typeof(type) === "string") ? "key" + type : "keydown";	
    var modifier = (typeof(modifiers) === "object") ? modifier : {};

    var event = document.createEvent("HTMLEvents");
    event.initEvent(evtName, true, false);
    event.keyCode = keyCode;
    
    for (var i in modifiers) {
        event[i] = modifiers[i];
    }

    document.dispatchEvent(event);
}
/*****************************************************************************/        
    </script>
</html>
