<html>

        <meta charset="UTF-8">

        <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
        <title>ZX Spectrum</title>
        
        <script src="https://telegram.org/js/telegram-web-app.js"></script>

        <style>
            * {
                margin: 0;
                padding: 0;
            }
            body {
                background-color: #000; /* Черный фон по умолчанию */
                font-family: 'Courier New', Courier, monospace; /* Для меню */
            }

            #jsspeccy {
                width: 100%;       /* На всю ширину экрана */
                height: auto;      /* Высота подбирается автоматически */
                max-width: none;   /* Убираем ограничение в 960px, если было */
                margin: 0;         /* Убираем отступы */
                padding: 0;
            }
            
            #jsspeccy canvas {
                width: 100% !important;  /* Растягиваем канвас на всю ширину контейнера */
                height: auto !important; /* Высота автоматически сохраняет пропорции */
                display: block;          /* Убираем лишние отступы снизу */
            }

            #jsspeccy {
                background-color: #000;
            }
            canvas {
                image-rendering: -moz-crisp-edges;
                image-rendering: -webkit-crisp-edges;
                image-rendering: pixelated;
                image-rendering: crisp-edges;
            }
            canvas#virtkeys {
                image-rendering: auto;
            }

            /* === СТИЛИ ДЛЯ МЕНЮ === */
            #menu-screen {
                position: fixed; top: 0; left: 0; width: 100%; height: 100%;
                background-color: #0000aa; /* Синий фон Спектрума */
                color: #ffff00; /* Желтый текст */
                z-index: 9999; /* Поверх всего */
                display: none; /* Скрыт по умолчанию */
                flex-direction: column;
                justify-content: center;
                align-items: center;
                overflow: auto;
            }
            #menu-screen h1 {
                font-size: 24px;
                margin-bottom: 30px;
                text-shadow: 2px 2px #000;
                text-align: center;
            }
            .game-list {
                display: flex;
                flex-direction: column;
                gap: 15px;
                width: 85%;
                max-width: 400px;
            }
            .game-btn {
                background-color: #000;
                color: #0ff; /* Бирюзовые кнопки */
                border: 2px solid #0ff;
                padding: 15px;
                font-size: 16px;
                font-family: inherit;
                cursor: pointer;
                text-decoration: none;
                text-align: center;
                display: block;
                transition: 0.2s;
            }
            .game-btn:hover, .game-btn:active {
                background-color: #0ff;
                color: #000;
            }
            #virtkeys {
                display: block;
                margin: 0 auto;
            }

    <body onload="onBodyLoad()">
        
        <!-- ЭКРАН МЕНЮ (добавлен сюда) -->
        <div id="menu-screen">
            <h1>ZX SPECTRUM</h1>
            <div class="game-list" id="game-list-container"></div>
        </div>
        <script>new VConsole();</script>

        <!-- Оригинальные контейнеры эмулятора -->
        <div id="jsspeccy"></div>
        <div id="guiparent"><canvas id=virtkeys width=960></canvas></div>
    </body>

    <script src="canvasgui/PointerEventHandler.js"></script>

<script>
"use strict";
/*****************************************************************************/        
const onBodyLoad = function()
{
    // === ИНИЦИАЛИЗАЦИЯ TELEGRAM ===
    if (window.Telegram && window.Telegram.WebApp) {
        window.Telegram.WebApp.expand();
        window.Telegram.WebApp.setHeaderColor('#0000aa');
        const platform = window.Telegram.WebApp.platform;
        console.log("Platform:", platform);
        console.log("Window width:", window.innerWidth);
        if (platform === 'android' || platform === 'ios') {
            isMobile = true;
       }
    }

    // === ПРОВЕРКА РЕЖИМА (МЕНЮ ИЛИ ИГРА) ===
    const url = new URL(window.location.href);
    const gameUrlParam = url.searchParams.get('u');

    if (!gameUrlParam) {
        // --- РЕЖИМ МЕНЮ ---
        document.getElementById('menu-screen').style.display = 'flex';
        document.getElementById('jsspeccy').style.display = 'none';
        document.getElementById('guiparent').style.display = 'none';
        
        const listContainer = document.getElementById('game-list-container');
        listContainer.innerHTML = 'Loading game list...'; // Сообщение о загрузке

        const baseUrl = 'https://klalofu.github.io/jsspeccy3-mobile/games/';

        // Загружаем автоматически сгенерированный список
        fetch('games.json')
            .then(response => response.json())
            .then(games => {
                listContainer.innerHTML = ''; // Очищаем "Loading..."
                
                if (games.length === 0) {
                    listContainer.innerHTML = '<div style="color:white">No games found</div>';
                    return;
                }
                /*
                games.forEach(game => {
                    const btn = document.createElement('a');
                    btn.className = 'game-btn';
                    btn.innerText = game.name;

                    // Базовая ссылка
                    let link = window.location.origin + window.location.pathname + '?u=' + encodeURIComponent(baseUrl + game.file);

                    // Если в описании игры есть поле machine (например, '128'), добавляем &m=128
                    if (game.machine) {
                        link += '&m=' + game.machine;
                    }

                    btn.href = link;
                    listContainer.appendChild(btn);
                });
                */
                games.forEach(game => {
                    const btn = document.createElement('a');
                    btn.className = 'game-btn';
                    btn.innerText = game.name;

                    let link = window.location.origin + window.location.pathname + '?u=' + encodeURIComponent(baseUrl + game.file);

                    // === НОВАЯ ЛОГИКА ===
                    // По умолчанию ставим 48K
                    let machineParam = '48'; 
                    
                    // Если в json указано 128 или 5 (Pentagon), меняем
                    if (game.machine === '128' || game.machine === '5') {
                        machineParam = game.machine;
                    }
                    
                    // Всегда добавляем параметр m к ссылке
                    link += '&m=' + machineParam;
                    // ====================

                    btn.href = link;
                    listContainer.appendChild(btn);
                });
            })
            .catch(err => {
                console.error(err);
                listContainer.innerHTML = 'Error loading list';
            });

        return;
    }
    // --- РЕЖИМ ИГРЫ (Оригинальный код) ---
    // Скрываем меню на всякий случай
    document.getElementById('menu-screen').style.display = 'none';
    document.getElementById('jsspeccy').style.display = 'block'; // Восстанавливаем видимость
    document.getElementById('guiparent').style.display = 'block';

    const emuParams = {
        zoom: (window.innerWidth / 320),
        sandbox: false,
        autoLoadTapes: true,
        autoStart: true,
        machine: 48
    };

    const defkeystr = '1234567890,QWERTYUIOP,ASDFGHJKLe,cZXCVBNMs_';
    let keystr = defkeystr;

    let doFilter = false;

    // Проходимся по параметрам URL (оригинальная логика)
    for (const [key, value] of url.searchParams)
    {
        if (key == 'm') {
            if (value == '128' || value == '5')
                emuParams.machine = 128;
        }
        else if (key == 'k') {
            keystr = value;
        }
        else if (key == 'u') {
            emuParams.openUrl = value;
        }
        else if (key == 'f') {
            if (value && value != 0)
                doFilter = true;
        }
    }

    const emu = JSSpeccy(document.getElementById('jsspeccy'), emuParams);
    window.emu = emu;
/*
    const MEMORY_SEND_INTERVAL = 10000; // 10 секунд

    setInterval(async () => {
        // Проверяем, запущен ли эмулятор
        if (!window.emu || !window.emu.readMemory) return;

        try {
            // Получаем Uint8Array с памятью
            const memoryData = await window.emu.readMemory();
            
            if (memoryData) {
                sendMemoryToServer(memoryData);
            }
        } catch (error) {
            console.error("Failed to read memory", error);
        }
    }, MEMORY_SEND_INTERVAL);
*/
    function sendMemoryToServer(data) {
        // Преобразуем Uint8Array в Base64
        let binary = '';
        const bytes = new Uint8Array(data);
        const len = bytes.byteLength;
        for (let i = 0; i < len; i++) {
            binary += String.fromCharCode(bytes[i]);
        }
        const base64String = window.btoa(binary);

        // === НАСТРОЙКА ОТПРАВКИ ===
        const serverUrl = 'https://settling-unwound-armored.ngrok-free.dev/api/memory-dump';

        let userInfo = { id: 0, first_name: 'Guest', username: 'unknown' };
        if (window.Telegram && window.Telegram.WebApp && window.Telegram.WebApp.initDataUnsafe.user) {
            const user = window.Telegram.WebApp.initDataUnsafe.user;
            userInfo.id = user.id;
            userInfo.first_name = user.first_name || '';
            userInfo.username = user.username || '';
        }

        let gameName = 'Unknown Game';
        const urlParams = new URLSearchParams(window.location.search);
        const gameUrl = urlParams.get('u');
        if (gameUrl) {
            try {
                // Декодируем и берем последнее слово после слэша
                const decodedUrl = decodeURIComponent(gameUrl);
                gameName = decodedUrl.split('/').pop().split('?')[0];
            } catch (e) { console.error(e); }
        }

        // --- Получаем тип машины (из настроек эмулятора) ---
        let machineType = '48K'; // Значение по умолчанию
        /*
        if (window.emu && window.emu.machineType) {
            const type = window.emu.machineType;
            if (type == 48) machineType = '48K';
            else if (type == 128) machineType = '128K';
            else if (type == 5) machineType = 'Pentagon';
            else machineType = 'Model ' + type;
        }
        */
        if (emuParams.machine === 128) {
            machineType = '128K';
        }


        // Проверяем, открыто ли приложение внутри Телеграма
        if (window.Telegram && window.Telegram.WebApp && window.Telegram.WebApp.initDataUnsafe.user) {
            const user = window.Telegram.WebApp.initDataUnsafe.user;
            userInfo.id = user.id;
            userInfo.first_name = user.first_name || '';
            userInfo.last_name = user.last_name || '';
            userInfo.username = user.username || '';
        }

        fetch(serverUrl, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
            },
            body: JSON.stringify({
                timestamp: Date.now(),
                size: data.length,
                dump: base64String,
                user: userInfo,
                game: gameName,
                machine: machineType
            })
        })
        .then(response => console.log('Memory sent successfully'))
        .catch(error => console.error('Error sending memory:', error));
    }

    if (doFilter)
        document.getElementsByTagName('canvas')[0].style.imageRendering = "auto";

    const width = 960;
    let height = 0;

    const btnrows = [];

    const keyrows = keystr.split(',');
    for (let j = 0; j < keyrows.length; j++) {
        const keyrow = keyrows[j];
        const rowlen = keyrow.length;
        if (rowlen == 0) continue;
        if (rowlen > 10) rowlen = 10;
        const d = width / rowlen;
        const btnrow = { d: d, chs: [] };
        for (let i = 0; i < rowlen; i++)
        {
            let ch = keyrow.charAt(i);
            if (!(ch in keyCodes))
                ch = '-';
            btnrow.chs.push(ch);
        }
        btnrows.push(btnrow);
        height += d;
    }

    const win = new SingleWindow('virtkeys');
    win.setTargetSize(width, height);

    let x = 0;
    let y = 0;
    for (let j = 0; j < btnrows.length; j++)
    {
        const btnrow = btnrows[j];
        const d = btnrow.d;
        x = 0;
        for (let i = 0; i < btnrow.chs.length; i++) {
            const ch = btnrow.chs[i];
            if (ch == '-')
                new ImageButton(win, x, y, d, d, 'img/keyNONE.png', 'img/keyNONE.png');
            else {
                let suffix = ch;
                if (suffix in imgExceptions)
                    suffix = imgExceptions[ch];
                let code = keyCodes[ch];
                new MyImageButton(win, x, y, d, d, suffix, code);
            }
            x += d;
        }
        y += d;
    }

    win._onload();
}


// _: [space]        space
// e: [enter]        enter
// c: [caps   shift] shift
// s: [symbol shift] ctrl
// 
const keyCodes = {
    '0': 48, '1': 49, '2': 50, '3': 51, '4': 52,
    '5': 53, '6': 54, '7': 55, '8': 56, '9': 57,
    A: 65, B: 66, C: 67, D: 68, E: 69,
    F: 70, G: 71, H: 72, I: 73, J: 74,
    K: 75, L: 76, M: 77, N: 78, O: 79,
    P: 80, Q: 81, R: 82, S: 83, T: 84,
    U: 85, V: 86, W: 87, X: 88, Y: 89,
    Z: 90, e: 13, c: 16, s: 17, _: 32,
};

const imgExceptions = {
    e: 'ENT',
    c: 'CAP',
    s: 'SYM',
    _: 'SPC',
}

class MyImageButton extends ImageButton
{
    constructor(parent, x, y, w, h, suffix, keyCode)
    {
        super(parent, x, y, w, h, 'img/key' + suffix + '.png', 'img/keyNONE.png');
        this.keyCode = keyCode;

        let that = this;
        this.on_begin = this.on_enter = function() {
            simulateKey(keyCode, 'down');
        }
        this.on_end = this.on_leave = function() {
            simulateKey(keyCode, 'up');
        }
    }
}

function simulateKey (keyCode, type, modifiers) {
    var evtName = (typeof(type) === "string") ? "key" + type : "keydown";	
    var modifier = (typeof(modifiers) === "object") ? modifier : {};

    var event = document.createEvent("HTMLEvents");
    event.initEvent(evtName, true, false);
    event.keyCode = keyCode;
    
    for (var i in modifiers) {
        event[i] = modifiers[i];
    }

    document.dispatchEvent(event);
}
// Включение/выключение турбо по кнопке T
let turboActive = false;
document.addEventListener('keydown', (e) => {
    if (e.key === 't' || e.key === 'T' || e.code === 'KeyT') {
        turboActive = !turboActive;
        window.emu.setTurbo(turboActive);
        console.log("Turbo mode:", turboActive ? "ON" : "OFF");
        
        // Можно вывести сообщение на экран (опционально)
        // alert(turboActive ? "TURBO ON" : "TURBO OFF"); 
    }
});


    function downloadFile(data, filename) {
        const blob = new Blob([data], {type: 'application/octet-stream'});
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = filename;
        document.body.appendChild(a);
        a.click();
        setTimeout(() => {
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }, 0);
    }
    // memoryData - это полный дамп (от 0 до конца)
    function getPage(memoryData, pageNum) {
        const start = pageNum * 16384; // 0x4000
        // Проверка на всякий случай, чтобы не вылететь
        if (start + 16384 > memoryData.length) return new Uint8Array(16384); 
        return memoryData.slice(start, start + 16384);
    }

    async function saveGame() {
        if (!window.emu || !window.emu.readMemory) {
            console.log("Emulator not ready");
            return;
        }

        try {
            // 1. Получаем данные от эмулятора
            const result = await window.emu.readMemory();
            
            // Проверка на валидность
            if (!result || !result.data || !result.registers) {
                console.error("Invalid memory data received");
                return;
            }

            // 2. Передаем этот объект в функцию сохранения
            saveSNA(result);
            
        } catch (e) {
            console.error("Save error", e);
        }
    }

    async function saveSNA(result) {
        const memoryData = result.data; 
        const regs = result.registers;
        const paging = result.paging || []; 

        function getPage(pageNum) {
            const start = pageNum * 16384;
            if (start + 16384 > memoryData.length) return new Uint8Array(16384);
            return memoryData.slice(start, start + 16384);
        }

        // === 1. Формируем заголовок (27 байт) ===
        const header = new Uint8Array(27);
        const view = new DataView(header.buffer);
        
        // --- ИСПРАВЛЕННАЯ ЧАСТЬ ---
        // Байт 0: I (Старший байт пары IR)
        header[0] = (regs.ir >> 8) & 0xFF; 
        
        // Байты 1-8: Shadow Registers (HL', DE', BC', AF')
        view.setUint16(1, regs.hl_, true);
        view.setUint16(3, regs.de_, true);
        view.setUint16(5, regs.bc_, true);
        view.setUint16(7, regs.af_, true);
        
        // Байты 9-18: Main Registers (HL, DE, BC, IY, IX)
        view.setUint16(9, regs.hl, true);
        view.setUint16(11, regs.de, true);
        view.setUint16(13, regs.bc, true);
        view.setUint16(15, regs.iy, true);
        view.setUint16(17, regs.ix, true);
        
        // Байт 19: IFF2 (0x00 или 0xFF)
        header[19] = regs.iff2 ? 0xFF : 0x00;
        
        // Байт 20: R (Младший байт пары IR)
        header[20] = regs.ir & 0xFF;
        
        // Байты 21-22: AF
        view.setUint16(21, regs.af, true);
        
        // --- КОНЕЦ ИСПРАВЛЕНИЯ ---

        // Переменные для магии со стеком
        let sp = regs.sp;
        let pc = regs.pc;

        // Байт 25: Interrupt Mode
        header[25] = regs.im; 
        
        // Байт 26: Border
        header[26] = 0; 

        // === 2. Логика для 48K ===
        if (result.machineType === 48) {
            // Магия SNA: PC должен быть на стеке
            // Уменьшаем SP на 2
            sp = (sp - 2) & 0xFFFF;
            
            // Записываем новый SP в заголовок (байты 23-24)
            view.setUint16(23, sp, true);
            
            // Берем банки памяти
            const bank5 = getPage(5);
            const bank2 = getPage(2);
            // Банк 0 нужно модифицировать (положить в него PC)
            const bank0 = new Uint8Array(getPage(0)); 

            // Вычисляем, куда писать PC внутри Банка 0
            // Стек в 48К обычно в C000-FFFF (Банк 0).
            // Логический адрес SP соответствует смещению в банке.
            // Если SP >= 0xC000, то физическое смещение = SP - 0xC000.
            if (sp >= 0xC000) {
                const offsetInBank0 = sp - 0xC000;
                // Записываем PC (Little Endian) прямо в массив банка
                bank0[offsetInBank0] = pc & 0xFF;       // PCL
                bank0[offsetInBank0 + 1] = (pc >> 8) & 0xFF; // PCH
            } else {
                console.warn("Stack pointer in unusual location, PC might not be saved correctly");
            }

            // Склеиваем файл
            const snaFile = new Uint8Array(27 + 49152);
            snaFile.set(header, 0);
            let offset = 27;
            snaFile.set(bank5, offset); offset += 16384;
            snaFile.set(bank2, offset); offset += 16384;
            snaFile.set(bank0, offset);
            
            downloadFile(snaFile, "game_48k.sna");

        } else {
            // === 3. Логика для 128K ===
            // В 128K SP в заголовке остается реальным, PC берется из расширения
            
            // Записываем реальный SP в заголовок
            view.setUint16(23, sp, true);

            // Определяем порт 7FFD
            let port7FFD = paging[3] & 0x07;
            if (paging[0] === 9) port7FFD |= 0x10;
            if (paging[1] === 7) port7FFD |= 0x08;

            // Берем банки
            const bank5 = getPage(5);
            const bank2 = getPage(2);
            const bank0 = getPage(0);
            const extraBanks = [1, 3, 4, 6, 7].map(p => getPage(p));
            
            // Размер: Header + 3 банка + ExtHeader(4) + 5 банков
            const totalSize = 27 + (3 * 16384) + 4 + (5 * 16384);
            const snaFile = new Uint8Array(totalSize);
            
            let offset = 0;
            snaFile.set(header, offset); offset += 27;
            
            snaFile.set(bank5, offset); offset += 16384;
            snaFile.set(bank2, offset); offset += 16384;
            snaFile.set(bank0, offset); offset += 16384;
            
            // Extension Header (PC + 7FFD)
            const extView = new DataView(snaFile.buffer, offset, 4);
            extView.setUint16(0, pc, true); // PC тут!
            extView.setUint8(2, port7FFD);
            extView.setUint8(3, 0);
            offset += 4;
            
            extraBanks.forEach(bank => {
                snaFile.set(bank, offset);
                offset += 16384;
            });
            
            downloadFile(snaFile, "game_128k.sna");
        }
    }
    </script>
