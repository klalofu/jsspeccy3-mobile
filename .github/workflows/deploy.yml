name: Deploy to GitHub Pages

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: 'npm'
      
      - name: Install dependencies
        run: npm install
      
      - name: Generate games list
        run: |
          python3 -c "
          import os
          import json
          games = []
          # Сканируем папку games
          for f in sorted(os.listdir('games')):
              if f.lower().endswith(('.tap', '.tzx', '.sna', '.z80')):
                  # Имя берем из названия файла (без расширения)
                  name = os.path.splitext(f)[0]
                  games.append({'file': f, 'name': name})
          # Сохраняем в файл dist/games.json
          os.makedirs('dist', exist_ok=True)
          with open('dist/games.json', 'w') as out:
              json.dump(games, out, indent=2)
          print('Generated games.json with', len(games), 'games')
          "

      - name: Build
        run: npm run build
        env:
          CI: false
          NODE_OPTIONS: --openssl-legacy-provider
      
      - name: Copy games to dist
        run: |
          mkdir -p dist/games
          cp games/* dist/games/
      
      - name: Setup Pages
        uses: actions/configure-pages@v4
      - name: Setup Pages
        uses: actions/configure-pages@v4
      
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'
      
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
